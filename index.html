<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Core News | خلاصة الأخبار</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0a0a0a; color: #e5e5e5; }
        
        header { padding: 40px 20px; text-align: center; border-bottom: 2px solid #d4af37; background: #000; }
        h1 { font-size: 3.5em; color: #d4af37; margin-bottom: 10px; }
        
        /* تنسيق الزرار الصغير */
        .dev-btn-container { text-align: center; margin: 20px 0; }
        .dev-btn { 
            display: inline-block; padding: 8px 20px; border: 1px solid #d4af37; 
            color: #d4af37; text-decoration: none; font-size: 0.9em; transition: 0.3s;
        }
        .dev-btn:hover { background: #d4af37; color: #000; }

        .main-container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        
        .card { background: #171717; padding: 30px; border: 1px solid #333; text-align: center; transition: 0.3s; text-decoration: none; color: #e5e5e5; }
        .card:hover { border-color: #d4af37; transform: translateY(-5px); background: #1a1a1a; }
        .card h2 { color: #d4af37; margin-bottom: 10px; }
    </style>
</head>
<body>

    <header>
        <h1>CORE NEWS</h1>
        <p>الخبر من جوهره</p>
        
        <div class="dev-btn-container">
            <a href="dev-profile/index.html" class="dev-btn">عن المطور</a>
        </div>
    </header>

    <div class="main-container">
        <div class="grid-container">
            <a href="space.html" class="card"><h2>🌌 الفضاء</h2><p>أسرار الكون</p></a>
            <a href="sports.html" class="card"><h2>⚽ الرياضة</h2><p>نتائج الملاعب</p></a>
            <a href="tech.html" class="card"><h2>⚡ التكنولوجيا</h2><p>عالم الذكاء</p></a>
            <a href="nature.html" class="card"><h2>🌿 الطبيعة</h2><p>موسوعة الأرض</p></a>
        </div>
    </div>

</body>
</html>
