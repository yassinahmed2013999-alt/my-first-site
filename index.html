<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core News | خلاصة الأخبار</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* خلفية سوداء ملكية */
        body { background-color: #0a0a0a; color: #e5e5e5; font-family: 'Segoe UI', sans-serif; }
        
        /* هيدر بلمسة ذهبية خفيفة */
        header { padding: 40px 20px; text-align: center; background: #000; border-bottom: 3px solid #d4af37; }
        h1 { font-size: 3.5em; color: #d4af37; letter-spacing: 5px; font-weight: 900; text-shadow: 2px 2px 10px rgba(212, 175, 55, 0.3); }
        
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 40px; max-width: 1200px; margin: 0 auto; }
        
        /* كروت رمادي داكن مع حواف ذهبية */
        .card { background: #171717; padding: 30px; border-radius: 0; text-align: center; transition: 0.4s; border: 1px solid #333; text-decoration: none; color: white; }
        .card:hover { transform: translateY(-5px); border-color: #d4af37; background: #1a1a1a; }
        
        .card h2 { font-size: 1.8em; margin-bottom: 10px; color: #d4af37; }
        .card p { color: #a3a3a3; }

        footer { text-align: center; padding: 20px; color: #525252; font-size: 0.9em; border-top: 1px solid #333; }
    </style>
</head>
<body>

    <header>
        <h1>CORE NEWS</h1>
        <p>الخبر من جوهره</p>
    </header>

    <div class="grid-container">
        <a href="space.html" class="card">
            <h2>🌌 الفضاء</h2>
            <p>أسرار المجرات والكون البعيد.</p>
        </a>
        <a href="sports.html" class="card">
            <h2>⚽ الرياضة</h2>
            <p>أهم الأحداث والمباريات العالمية.</p>
        </a>
        <a href="tech.html" class="card">
            <h2>⚡ التكنولوجيا</h2>
            <p>الذكاء الاصطناعي ومستقبل التقنية.</p>
        </a>
        <a href="nature.html" class="card">
            <h2>🌿 الطبيعة</h2>
            <p>تقارير بيئية وموسوعة الأرض.</p>
        </a>
    </div>

    <footer>
        &copy; 2026 Core News - جميع الحقوق محفوظة
    </footer>

</body>
</html>
