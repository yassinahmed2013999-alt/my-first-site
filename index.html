<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core News | خلاصة الأخبار</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0f172a; color: #f1f5f9; font-family: 'Segoe UI', sans-serif; }
        
        header { padding: 40px 20px; text-align: center; background: linear-gradient(135deg, #1e293b, #0f172a); border-bottom: 3px solid #38bdf8; }
        h1 { font-size: 3em; color: #38bdf8; letter-spacing: 3px; font-weight: 800; }
        
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 40px; max-width: 1200px; margin: 0 auto; }
        
        .card { background: #1e293b; padding: 30px; border-radius: 15px; text-align: center; transition: 0.4s; border: 1px solid #334155; text-decoration: none; color: white; }
        .card:hover { transform: translateY(-10px); border-color: #38bdf8; box-shadow: 0 10px 20px rgba(56, 189, 248, 0.2); }
        .card h2 { font-size: 1.8em; margin-bottom: 10px; }
        .card p { color: #94a3b8; }

        footer { text-align: center; padding: 20px; color: #64748b; font-size: 0.9em; border-top: 1px solid #1e293b; }
    </style>
</head>
<body>

    <header>
        <h1>CORE NEWS</h1>
        <p>الخبر من جوهره</p>
    </header>

    <div class="grid-container">
        <a href="space.html" class="card">
            <h2>🌌 الفضاء</h2>
            <p>أسرار المجرات والكون البعيد.</p>
        </a>
        <a href="sports.html" class="card">
            <h2>⚽ الرياضة</h2>
            <p>أهم الأحداث والمباريات العالمية.</p>
        </a>
        <a href="tech.html" class="card">
            <h2>⚡ التكنولوجيا</h2>
            <p>الذكاء الاصطناعي ومستقبل التقنية.</p>
        </a>
        <a href="nature.html" class="card">
            <h2>🌿 الطبيعة</h2>
            <p>تقارير بيئية وموسوعة الأرض.</p>
        </a>
    </div>

    <footer>
        &copy; 2026 Core News - جميع الحقوق محفوظة
    </footer>

</body>
</html>
