<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الطبيعة | 50 تقريرًا عن كوكبنا الجميل</title>
    <style>
        body { background-color: #051405; color: #d1fad5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; line-height: 1.8; }
        .main-container { max-width: 950px; margin: 0 auto; }
        header { text-align: center; padding: 30px; background: #062406; border-bottom: 4px solid #22c55e; border-radius: 12px; margin-bottom: 40px; }
        h1 { color: #ffffff; margin: 0; }
        .news-card { background: #0a1f0a; border: 1px solid #166534; border-radius: 12px; padding: 20px; margin-bottom: 25px; }
        h2 { color: #4ade80; font-size: 18px; margin-top: 0; }
        .data-box { background: #051405; border-right: 4px solid #22c55e; padding: 10px; font-size: 13px; color: #86efac; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="main-container">
        <header>
            <h1>🌍 موسوعة الطبيعة: 50 خبرًا عن كوكبنا</h1>
            <br><a href="index.html" style="color: #4ade80; text-decoration: none; font-weight: bold;">⬅️ العودة للرئيسية</a>
        </header>

        <script>

            ];
            news.forEach((n, i) => {
                document.write(`<div class="news-card"><h2>${i+1}. ${n}</h2><div class="data-box">طبيعة وبقاء | تقرير رقم ${i+1}</div></div>`);
            });
        </script>
    </div>
</body>
</html>
